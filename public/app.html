<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoundRush</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; height: 100vh; display: flex; flex-direction: column; }
.toolbar { display: flex; gap: 8px; padding: 8px 12px; background: #141414; border-bottom: 1px solid #222; align-items: center; }
.toolbar input { flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 13px; outline: none; }
.toolbar input:focus { border-color: #1ed760; }
.toolbar button { padding: 8px 18px; border-radius: 20px; border: none; background: #1ed760; color: #000; font-weight: 600; font-size: 13px; cursor: pointer; }
.toolbar button:hover { background: #1fdf61; }
iframe { flex: 1; border: none; width: 100%; }
.status { padding: 4px 12px; font-size: 11px; color: #666; background: #0d0d0d; border-top: 1px solid #222; text-align: center; }
.status a { color: #1ed760; text-decoration: none; }
@media (prefers-color-scheme: light) {
  body { background: #fff; color: #000; }
  .toolbar { background: #f5f5f5; border-color: #ddd; }
  .toolbar input { background: #fff; border-color: #ccc; color: #000; }
  .status { background: #fafafa; border-color: #ddd; }
}
</style>
</head>
<body>
<div class="toolbar">
  <input id="urlInput" type="text" placeholder="Enter a URL or search..." value="https://soundcloud.com">
  <button onclick="navigate()">Go</button>
</div>
<iframe id="browser" src="https://soundcloud.com"></iframe>
<div class="status">
  <span id="statusText">Browse a music site — SoundRush detects it automatically</span>
</div>
<script>
const browser = document.getElementById("browser");
const urlInput = document.getElementById("urlInput");

function navigate() { browser.src = urlInput.value.startsWith("http") ? urlInput.value : "https://" + urlInput.value; }
browser.addEventListener("load", () => { urlInput.value = browser.src; });
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "soundrush-download") {
    document.getElementById("statusText").textContent = "Downloading: " + e.data.url;
  }
});
</script>
</body>
</html>
